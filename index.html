<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data Drift</title>
<link rel="stylesheet" href="pg_style.css?v=20">
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<script src="vendor/katex/katex.min.js"></script>
<script src="vendor/katex/auto-render.min.js"></script>
<style>
  /* drift-only (โครง/ขนาด/bar = .distcls กลางใน pg_style) — เหลือ: lock · legend sub-parts · univariate rows */
  input[type=range]:disabled{opacity:.5}
  .classleg .clrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;color:#555}
  .classleg .cli .nm{font-weight:600}
  .classleg .cli.sep{margin-left:8px;padding-left:14px;border-left:1px solid var(--line)}
  /* control: โชว์ทุกแท็บ จาง+disable เฉพาะตัวที่ไม่เกี่ยวกับแท็บ (ของเดิม) — override central hide */
  body.pg.distcls .drow.off{display:flex!important;opacity:.42}
  /* align 3 rows across lcol|mcolA|mcolB: same gap + same row height + same header height */
  .below .lcol,.below .mcol{gap:9px}
  .distcls .lcol .lhd,.distcls .mcol .mhd{min-height:20px;height:20px;margin:0 0 6px;line-height:1.3}   /* หัวคอลัมน์สูงเท่ากัน → 3 แถวตรงกัน */
  .below .urow{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0;min-height:50px;font-size:15px}
  .below .urow b{font-variant-numeric:tabular-nums}
  .below .uv{display:flex;flex-direction:column;align-items:flex-end;line-height:1.12;flex:none}
  .below .lev{font-size:11px}
  .below .mbar{min-height:50px;display:flex;flex-direction:column;justify-content:center;gap:4px;margin:0}
  .below .mbar .barrow{display:flex;align-items:center;gap:9px}
  .below .mbar .barrow .track{flex:0 1 58%;min-width:0}   /* bar สั้นลง */
  .below .mbar .trn{font-size:11.5px;color:#6b7280;white-space:nowrap;margin-left:auto}   /* train อยู่ใต้ test แถวเดียวกับ bar */
</style>
</head>
<body class="pg distcls">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">Shows how a shift between the train and deploy distributions changes a classifier's metrics (recall, precision, accuracy, F1) and the KL drift score.</h2>

<div class="wrap">
  <div class="hdr"><h1 id="h1">Data Drift</h1><div class="tabs" id="tabs"></div></div>
  <div class="layout">
    <div class="stage">
      <div class="canvasbox"><canvas id="cv"></canvas></div>
      <div class="classleg" id="classleg"></div>
      <div class="below">
        <div class="lcol" id="uni"></div>
        <div class="mcol" id="mcolA"></div>
        <div class="mcol" id="mcolB"></div>
      </div>
    </div>

    <div class="panel">
      <div class="dhd" id="hd-train">Train distribution</div>
      <div class="dgrid">
        <div class="drow" id="row-muOK"><span class="dlab" id="lbl-muOK"></span><input type="range" id="RmuOK" min="1" max="7" step="0.1" value="2.2"><input class="num" type="number" id="NmuOK" min="1" max="7" step="0.1" value="2.2"></div>
        <div class="drow" id="row-sOK"><span class="dlab" id="lbl-sOK"></span><input type="range" id="RsOK" min="0.4" max="2.5" step="0.1" value="0.8"><input class="num" type="number" id="NsOK" min="0.4" max="2.5" step="0.1" value="0.8"></div>
        <div class="drow" id="row-muNG"><span class="dlab" id="lbl-muNG"></span><input type="range" id="RmuNG" min="1" max="7" step="0.1" value="5.0"><input class="num" type="number" id="NmuNG" min="1" max="7" step="0.1" value="5.0"></div>
        <div class="drow" id="row-sNG"><span class="dlab" id="lbl-sNG"></span><input type="range" id="RsNG" min="0.4" max="2.5" step="0.1" value="1.5"><input class="num" type="number" id="NsNG" min="0.4" max="2.5" step="0.1" value="1.5"></div>
        <div class="drow" id="row-pNG"><span class="dlab" id="lbl-pNG"></span><input type="range" id="RpNG" min="0.05" max="0.4" step="0.01" value="0.10"><input class="num" type="number" id="NpNG" min="0.05" max="0.4" step="0.01" value="0.10"></div>
      </div>
      <div class="dhd" id="hd-test">Test distribution (deploy)</div>
      <div class="dgrid">
        <div class="drow" id="row-dmu0"><span class="dlab" id="lbl-dmu0"></span><input type="range" id="Rdmu0" min="-2" max="2" step="0.1" value="0"><input class="num" type="number" id="Ndmu0" min="-2" max="2" step="0.1" value="0"></div>
        <div class="drow" id="row-ds0"><span class="dlab" id="lbl-ds0"></span><input type="range" id="Rds0" min="-0.8" max="2" step="0.1" value="0"><input class="num" type="number" id="Nds0" min="-0.8" max="2" step="0.1" value="0"></div>
        <div class="drow" id="row-dmu1"><span class="dlab" id="lbl-dmu1"></span><input type="range" id="Rdmu1" min="-2" max="2" step="0.1" value="0"><input class="num" type="number" id="Ndmu1" min="-2" max="2" step="0.1" value="0"></div>
        <div class="drow" id="row-ds1"><span class="dlab" id="lbl-ds1"></span><input type="range" id="Rds1" min="-0.8" max="2" step="0.1" value="0"><input class="num" type="number" id="Nds1" min="-0.8" max="2" step="0.1" value="0"></div>
        <div class="drow" id="row-pNGd"><span class="dlab" id="lbl-pNGd"></span><input type="range" id="RpNGd" min="0.05" max="0.5" step="0.01" value="0.10"><input class="num" type="number" id="NpNGd" min="0.05" max="0.5" step="0.01" value="0.10"></div>
        <div class="drow" id="row-n"><span class="dlab" id="lbl-n"></span><input type="range" id="Rn" min="20" max="300" step="10" value="100"><input class="num" type="number" id="Nn" min="20" max="300" step="10" value="100"></div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  var cv=document.getElementById('cv'),g=cv.getContext('2d');
  var SC=2,W=640,H=286;
  function sizeCanvas(){var box=document.querySelector('.canvasbox');var w=box.clientWidth||640,h=box.clientHeight||286;var dpr=window.devicePixelRatio||1;W=w;H=h;SC=dpr;cv.width=Math.round(w*dpr);cv.height=Math.round(h*dpr);}
  var bases=['muOK','muNG','sOK','sNG','pNG','n','dmu0','dmu1','ds0','ds1','pNGd'];
  var BASE={muOK:2.2,muNG:5.0,sOK:0.8,sNG:1.5,pNG:0.10,n:100,dmu0:0,dmu1:0,ds0:0,ds1:0,pNGd:0.10};
  // labels: subscript + = positive class, − = negative class (matches the canvas naming)
  var MT={'h1':'\\text{Data Drift}','hd-train':'\\textcolor{#6b7280}{\\text{Train distribution}}','hd-test':'\\textcolor{#1e3a8a}{\\text{Test distribution (deploy)}}',
    'lbl-muOK':'\\mu_-','lbl-muNG':'\\mu_+','lbl-sOK':'\\sigma_-','lbl-sNG':'\\sigma_+','lbl-pNG':'\\pi_+','lbl-n':'n',
    'lbl-dmu0':'\\Delta\\mu_-','lbl-dmu1':'\\Delta\\mu_+','lbl-ds0':'\\Delta\\sigma_-','lbl-ds1':'\\Delta\\sigma_+','lbl-pNGd':"\\pi_+'"};
  var TABS=[
   {n:'No drift',en:['muOK','muNG','sOK','sNG','pNG','n'],pre:{},nodrift:true},
   {n:'Mean shift',en:['dmu0','dmu1'],pre:{}},
   {n:'Variance shift',en:['ds0','ds1'],pre:{}},
   {n:'Prior shift',en:['pNGd'],pre:{}},
   {n:'Data drift',en:bases.slice(),pre:{}}
  ];
  function gv(b){return parseFloat(document.getElementById('R'+b).value);}
  function erf(x){var s=x<0?-1:1;x=Math.abs(x);var t=1/(1+0.3275911*x);var y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);return s*y;}
  function Phi(z){return 0.5*(1+erf(z/Math.SQRT2));}
  function pdf(x,m,s){return Math.exp(-0.5*Math.pow((x-m)/s,2))/(s*Math.sqrt(2*Math.PI));}
  function thr(m0,s0,m1,s1,p1){var p0=1-p1,a=m0,b=m1;for(var i=0;i<60;i++){var m=(a+b)/2;var v=p1*pdf(m,m1,s1)-p0*pdf(m,m0,s0);if(v<0)a=m;else b=m;}return (a+b)/2;}
  function mmv(m0,s0,m1,s1,p1){var mn=(1-p1)*m0+p1*m1;var ex2=(1-p1)*(s0*s0+m0*m0)+p1*(s1*s1+m1*m1);return [mn,ex2-mn*mn];}
  function KLg(mD,vD,mT2,vT){return Math.log(Math.sqrt(vT)/Math.sqrt(vD))+(vD+(mD-mT2)*(mD-mT2))/(2*vT)-0.5;}
  function zq(p){var a=-6,b=6;for(var i=0;i<46;i++){var m=(a+b)/2;if(Phi(m)<p)a=m;else b=m;}return (a+b)/2;}
  function qpts(mu,sd,k){var r=[];for(var j=0;j<k;j++)r.push(mu+sd*zq((j+0.5)/k));return r;}
  function scores(M1,S1,M0,S0,p1d,T){var rec=1-Phi((T-M1)/S1),fpr=1-Phi((T-M0)/S0);
    var prec=p1d*rec/Math.max(p1d*rec+(1-p1d)*fpr,1e-9),acc=p1d*rec+(1-p1d)*(1-fpr),f1=2*prec*rec/Math.max(prec+rec,1e-9);
    return {rec:rec,prec:prec,acc:acc,f1:f1,spec:1-fpr};}
  function renderTexts(){if(!window.katex)return;for(var id in MT){var el=document.getElementById(id);if(el){try{katex.render(MT[id],el,{throwOnError:false});}catch(e){}}}}
  /* confusion-cell palette: 4 distinct hues, colourblind-distinguishable (CUD), all ≥4.5:1 on white.
     errors FN(red) vs FP(purple) — different hue family + lightness so they're separable by eye (WCAG 1.4.1) */
  var G='#3F8F6B',Rd='#B0503A',Am='#b45309',Bl='#3F6E99',Pu='#a21caf',FNt='#8A6510',FPt='#2E7D70';   // pastel "soft muted" text/token tones
  function kx(t){try{return window.katex?katex.renderToString(t,{throwOnError:false}):t;}catch(e){return t;}}
  // classification 4-colour (CB-verified): TP red, FN gold, TN blue, FP teal. text uses dark FN/FP; letters are the non-colour cue
  function tc(t,c){return '\\textcolor{'+c+'}{\\mathrm{'+t+'}}';}
  var FM={Sensitivity:tc('TP',Rd)+'/('+tc('TP',Rd)+'+'+tc('FN',FNt)+')',
          Specificity:tc('TN',Bl)+'/('+tc('TN',Bl)+'+'+tc('FP',FPt)+')',
          Precision:tc('TP',Rd)+'/('+tc('TP',Rd)+'+'+tc('FP',FPt)+')',
          Accuracy:'('+tc('TP',Rd)+'+'+tc('TN',Bl)+')/n',
          F1:'2'+tc('TP',Rd)+'/(2'+tc('TP',Rd)+'+'+tc('FP',FPt)+'+'+tc('FN',FNt)+')',
          AUC:'P(\\hat p_+\\!>\\!\\hat p_-)'};
  function bar(name,dv,tv){dv=Math.max(0,Math.min(1,dv));tv=Math.max(0,Math.min(1,tv));
    var col=(dv<tv-0.005)?Rd:G;
    return '<div class="mbar"><div class="nm"><span class="lab">'+kx('\\text{'+name+'}\\;'+FM[name])+'</span><span class="v" style="color:'+col+'">'+kx(Math.round(dv*100)+'\\%')+'</span></div>'
      +'<div class="barrow"><span class="track"><span class="trainbar" style="width:'+(tv*100)+'%;background:'+col+'"></span><span class="fill" style="width:'+(dv*100)+'%;background:'+col+'"></span></span><span class="trn">'+kx('\\text{train }'+Math.round(tv*100)+'\\%')+'</span></div></div>';}
  function upd(){
   try{
    var m0=gv('muOK'),s0=gv('sOK'),m1=gv('muNG'),s1=gv('sNG'),p1=gv('pNG');
    var n=Math.round(gv('n')),dmu0=gv('dmu0'),dmu1=gv('dmu1'),ds0=gv('ds0'),ds1=gv('ds1'),p1d=gv('pNGd');
    if(TABS[curTab]&&TABS[curTab].nodrift){p1d=p1;document.getElementById('RpNGd').value=p1;document.getElementById('NpNGd').value=p1.toFixed(2);}
    var T=thr(m0,s0,m1,s1,p1);
    var M0=m0+dmu0,S0=Math.max(.2,s0+ds0),M1=m1+dmu1,S1=Math.max(.2,s1+ds1);
    var n1=Math.max(1,Math.round(n*p1d)),n0=n-n1;
    var ng=qpts(M1,S1,n1),ok=qpts(M0,S0,n0),i;
    var TP=0,FN=0,FP=0,TN=0;
    for(i=0;i<ng.length;i++){if(ng[i]>T)TP++;else FN++;}
    for(i=0;i<ok.length;i++){if(ok[i]>T)FP++;else TN++;}
    var dS=scores(M1,S1,M0,S0,p1d,T), tS=scores(m1,s1,m0,s0,p1,T);
    function auc(a0,sa0,a1,sa1){return Phi((a1-a0)/Math.sqrt(sa0*sa0+sa1*sa1));}
    var dAUC=auc(M0,S0,M1,S1), tAUC=auc(m0,s0,m1,s1);
    var trM=mmv(m0,s0,m1,s1,p1),dpM=mmv(M0,S0,M1,S1,p1d),KL=KLg(dpM[0],dpM[1],trM[0],trM[1]);
    document.getElementById('mcolA').innerHTML='<div class="mhd">'+kx('\\text{Classification metrics}')+'</div>'+bar('Sensitivity',dS.rec,tS.rec)+bar('Specificity',dS.spec,tS.spec)+bar('Precision',dS.prec,tS.prec);
    document.getElementById('mcolB').innerHTML='<div class="mhd">&nbsp;</div>'+bar('Accuracy',dS.acc,tS.acc)+bar('F1',dS.f1,tS.f1)+bar('AUC',dAUC,tAUC);
    function cdfMix(x,a,sa,b,sb,p){return (1-p)*Phi((x-a)/sa)+p*Phi((x-b)/sb);}
    var ks=0,xq; for(xq=-2;xq<=12;xq+=0.1){var dd=Math.abs(cdfMix(xq,m0,s0,m1,s1,p1)-cdfMix(xq,M0,S0,M1,S1,p1d));if(dd>ks)ks=dd;}
    var psi=0,nb=10,plo=-2,phi=12,pw2=(phi-plo)/nb; for(var bi=0;bi<nb;bi++){var xa=plo+bi*pw2,xb=xa+pw2,pt=Math.max(1e-6,cdfMix(xb,m0,s0,m1,s1,p1)-cdfMix(xa,m0,s0,m1,s1,p1)),qt=Math.max(1e-6,cdfMix(xb,M0,S0,M1,S1,p1d)-cdfMix(xa,M0,S0,M1,S1,p1d));psi+=(qt-pt)*Math.log(qt/pt);}
    function lvl(v,a,b){return v>b?'#c0392b':(v>a?'#b45309':'#15803d');}
    function lvlName(v,a,b){return v>b?'high':(v>a?'moderate':'low');}
    function urow(nm,val,c,lev){return '<div class="urow"><span>'+kx(nm)+'</span><span class="uv"><b style="color:'+c+'">'+kx(val)+'</b><span class="lev" style="color:'+c+'">'+kx('\\text{'+lev+'}')+'</span></span></div>';}
    document.getElementById('uni').innerHTML='<div class="lhd">'+kx('\\text{Univariate drift}')+'</div>'
      +urow('\\text{KL}',KL.toFixed(2),lvl(KL,0.1,0.25),lvlName(KL,0.1,0.25))+urow('\\text{KS}',ks.toFixed(2),lvl(ks,0.1,0.2),lvlName(ks,0.1,0.2))+urow('\\text{PSI}',psi.toFixed(2),lvl(psi,0.1,0.25),lvlName(psi,0.1,0.25));
    var L=44,Rm=16, pw=W-L-Rm;
    // reserved bands so labels never overlap the curves: TOPB (FN/TP), BOTB (TN/FP), THS (threshold strip)
    var TOPB=22, BOTB=22, THS=16, cyTop=TOPB, cyBot=H-BOTB-THS, cy=Math.round((cyTop+cyBot)/2);
    var topA=cy-cyTop, botA=cyBot-cy;
    var xmin=-1, xmax=11;
    function px(x){return L+(x-xmin)/(xmax-xmin)*pw;}
    var c1max=Math.max(pdf(m1,m1,s1),pdf(M1,M1,S1)), c0max=Math.max(pdf(m0,m0,s0),pdf(M0,M0,S0));
    var sc1=topA/(c1max*1.12), sc0=botA/(c0max*1.12);
    function y1(d){return cy-d*sc1;} function y0(d){return cy+d*sc0;}
    g.setTransform(SC,0,0,SC,0,0);
    g.clearRect(0,0,W,H);
    function area(fn,xlo,xhi,ymap,color,hatch){g.fillStyle=color;g.beginPath();g.moveTo(px(xlo),cy);var st=90,k,xx;for(k=0;k<=st;k++){xx=xlo+(xhi-xlo)*k/st;g.lineTo(px(xx),ymap(fn(xx)));}g.lineTo(px(xhi),cy);g.closePath();g.fill();
      if(hatch){g.save();g.clip();g.strokeStyle=hatch;g.lineWidth=1;var lo=Math.min(px(xlo),px(xhi)),hi=Math.max(px(xlo),px(xhi));for(var hx=lo-H;hx<hi+H;hx+=7){g.beginPath();g.moveTo(hx,0);g.lineTo(hx+H,H);g.stroke();}g.restore();}}
    var d1=function(x){return pdf(x,M1,S1);}, d0=function(x){return pdf(x,M0,S0);};
    area(d1,xmin,T,y1,'rgba(227,178,60,0.58)');   area(d1,T,xmax,y1,'rgba(224,122,95,0.52)');   // FN = อำพัน · TP = coral (เข้มขึ้น)
    area(d0,xmin,T,y0,'rgba(91,143,185,0.48)');    area(d0,T,xmax,y0,'rgba(91,168,160,0.58)');  // TN = ฟ้า · FP = teal (เข้มขึ้น)
    g.strokeStyle='rgba(128,128,128,0.5)';g.lineWidth=1;g.beginPath();g.moveTo(L,cy);g.lineTo(L+pw,cy);g.stroke();
    g.fillStyle='rgba(128,128,128,0.9)';g.font='14px KaTeX_Main,serif';g.textAlign='center';
    for(var a=Math.ceil(xmin);a<=xmax;a+=2)g.fillText(a,px(a),cy+13);
    var N=200,x;
    g.strokeStyle='#E07A5F';g.lineWidth=1.6;g.beginPath();for(i=0;i<=N;i++){x=xmin+(xmax-xmin)*i/N;var Y=y1(pdf(x,m1,s1));if(i==0)g.moveTo(px(x),Y);else g.lineTo(px(x),Y);}g.stroke();
    g.strokeStyle='#5B8FB9';g.beginPath();for(i=0;i<=N;i++){x=xmin+(xmax-xmin)*i/N;var Y0=y0(pdf(x,m0,s0));if(i==0)g.moveTo(px(x),Y0);else g.lineTo(px(x),Y0);}g.stroke();
    g.strokeStyle='#111';g.lineWidth=1.8;g.setLineDash([5,4]);g.beginPath();g.moveTo(px(T),cyTop-8);g.lineTo(px(T),H-THS+2);g.stroke();g.setLineDash([]);
    function dot(xp,yp,c,ring){g.fillStyle=c;g.beginPath();g.arc(xp,yp,4.7,0,7);g.fill();if(ring){g.strokeStyle=ring;g.lineWidth=2;g.beginPath();g.arc(xp,yp,6.8,0,7);g.stroke();}}
    for(i=0;i<ng.length;i++){dot(px(ng[i]),cy-7-(i%3)*7,'rgba(224,122,95,0.9)',ng[i]<=T?'#5B8FB9':null);}   // positive=coral · FN วงขอบ=ทายเป็น negative (ฟ้า)
    for(i=0;i<ok.length;i++){dot(px(ok[i]),cy+7+(i%3)*7,'rgba(91,143,185,0.85)',ok[i]>T?'#E07A5F':null);}    // negative=ฟ้า · FP วงขอบ=ทายเป็น positive (coral)
    function lab(txt,x,y,align,color,sz){g.font=(sz||15)+'px KaTeX_Main,serif';g.textAlign=align;g.textBaseline='alphabetic';g.fillStyle=color;g.fillText(txt,x,y);}
    // confusion counts ข้างเส้น threshold (เว้น ±12 ไม่ชิด) · class identity อยู่ใน legend นอก canvas
    lab('FN '+FN,px(T)-12,18,'right','#8A6510',15);
    lab('TP '+TP,px(T)+12,18,'left','#B0503A',15);
    lab('TN '+TN,px(T)-12,H-THS-6,'right','#3F6E99',15);
    lab('FP '+FP,px(T)+12,H-THS-6,'left','#2E7D70',15);
    lab('threshold '+T.toFixed(1),px(T),H-4,'center','#111',15);
   }catch(e){g.fillStyle='#c0392b';g.font='15px KaTeX_Main,serif';g.fillText('err: '+e.message,10,20);}
  }
  var curTab=0;
  function applyTab(k){var Tb=TABS[k];curTab=k;
    bases.forEach(function(b){var val=(Tb.pre&&b in Tb.pre)?Tb.pre[b]:BASE[b];
      document.getElementById('R'+b).value=val;document.getElementById('N'+b).value=val;
      var on=Tb.en.indexOf(b)>=0;document.getElementById('R'+b).disabled=!on;document.getElementById('N'+b).disabled=!on;
      document.getElementById('row-'+b).className='drow'+(on?'':' off');});   // โชว์ทุกแถวทุกแท็บ · จาง+disable ตัวที่ไม่เกี่ยว (ของเดิม)
    var btns=document.querySelectorAll('.tabbtn');for(var i=0;i<btns.length;i++)btns[i].className='tabbtn'+(i==k?' on':'');
    upd();}
  var tb=document.getElementById('tabs');
  TABS.forEach(function(Tb,i){var el=document.createElement('button');el.className='tabbtn';if(window.katex)katex.render('\\text{'+Tb.n+'}',el,{throwOnError:false});else el.textContent=Tb.n;el.addEventListener('click',function(){applyTab(i);});tb.appendChild(el);});
  bases.forEach(function(b){var Re=document.getElementById('R'+b),Ne=document.getElementById('N'+b);
    Re.addEventListener('input',function(){Ne.value=Re.value;upd();});
